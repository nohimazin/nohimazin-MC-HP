<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Minecraftサーバー</title>
  
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 50px; }
    #addressDisplay { margin-top: 20px; font-weight: bold; font-size: 24px; color: #333; }
    .error { color: red; margin-top: 15px; }
    .turnstile-container { display: flex; justify-content: center; margin-top: 20px; }
  </style>
</head>
<body>

  <h1>〇〇サーバーへようこそ！</h1>
  <p>以下のチェックボックスを押すと、サーバーに参加するためのアドレスが表示されます。</p>

  <div class="turnstile-container">
    <div class="cf-turnstile" 
         data-sitekey="ここにサイトキーを貼り付けてください" 
         data-callback="onTurnstileSuccess"></div>
  </div>

  <div id="addressDisplay"></div>
  <div id="errorMessage" class="error"></div>

  <script>
    // 2. 【WorkerのURL】をここに入力してください
    const WORKER_URL = 'https://〜〜〜.workers.dev';

    // Turnstileのチェックが成功した時に自動で実行される処理
    function onTurnstileSuccess(token) {
      const display = document.getElementById('addressDisplay');
      const errorMsg = document.getElementById('errorMessage');
      const turnstileWidget = document.querySelector('.turnstile-container');

      display.innerText = "通信中...";
      errorMsg.innerText = "";

      // Workerへトークンを送信
      const formData = new FormData();
      formData.append('token', token);

      fetch(WORKER_URL, {
        method: 'POST',
        body: formData
      })
      .then(response => response.json())
      .then(data => {
        if(data.success) {
          // 成功したらアドレスを表示し、Turnstileのウィジェットを隠す
          display.innerText = "アドレス: " + data.address;
          turnstileWidget.style.display = 'none';
        } else {
          errorMsg.innerText = "エラー: " + data.message;
          display.innerText = "";
          turnstile.reset(); // リセットしてもう一度押せるようにする
        }
      })
      .catch(error => {
        console.error('通信エラー:', error);
        errorMsg.innerText = "通信エラーが発生しました。";
        display.innerText = "";
        turnstile.reset();
      });
    }
  </script>
</body>
</html>
